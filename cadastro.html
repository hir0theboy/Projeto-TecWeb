        <!DOCTYPE html>
        <html lang="pt-br">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro de Produto</title>
        <link rel="stylesheet" href="src/style.css">
        </head>
        <body>

        <!-- IMAGEM TOPO -->
        <img class="topo" src="img/corredor2.jpg" alt="corredor">

        <!-- CADASTRO -->
        <section class="home-center">
            <div class="home-box">

            <h1>Cadastrar Produto</h1>

            <form id="formProduto" class="form-area">

                <input type="text" id="nome" placeholder="Nome do produto">
                
            <div class="preco-container">
    <span>R$</span>
    <input type="number" id="preco" min="0" step="0.01">
    </div>

                <select id="categoria">
                <option value="">Categoria</option>
                <option value="Alimentos">Alimentos</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Limpeza">Limpeza</option>
                </select>

                <textarea id="descricao" placeholder="Descrição"></textarea>

                <button type="submit">Cadastrar</button>

                <p id="erro"></p>

            </form>

            <div class="home-buttons">
                <a href="index.html" class="btn">Início</a>
                <a href="listagem.html" class="btn">Listagem</a>
            </div>

            </div>
        </section>

        <script src="js/storage.js"></script>
        <script src="js/cadastro.js"></script>
        <script src="js/ui.js"></script>

        </body>
        </html>
